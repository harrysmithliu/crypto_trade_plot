# Default configuration for the demo pipeline.

data_source:
  type: csv
  csv_path: data/raw/crypto_transactions_30d.csv
  local_timezone: America/Toronto
  window_days: 30
  invalid_ratio_threshold: 0.05

mock_data:
  enabled: false
  output_path: data/raw/crypto_transactions_30d.csv
  days: 30
  transactions_per_day: 100
  seed: 42

runtime:
  output_dir: reports
  log_dir: logs
  log_level: INFO

anomaly:
  min_terminal_tx: 50
  absolute_failure_rate_threshold: 10.0
  relative_failure_multiplier: 3.0
  baseline_lookback_days: 7
  min_baseline_days: 3

report:
  title: Crypto Trade Daily Report
  prefix: Crypto_Trade_Daily_Report
  scatter_max_points:
